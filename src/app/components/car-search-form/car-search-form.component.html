<!-- Hero Section -->
<div class="hero" [class.hero--popup]="showCloseButton">
  <button *ngIf="showCloseButton" class="hero__close" (click)="onClose()">&#10005;</button>

  <div class="hero__content" *ngIf="!showCloseButton">
    <h1 class="hero__title">
      <span class="hero__title-accent">Kolay</span> Kiralama,<br>
      Her Yere.
    </h1>
    <p class="hero__subtitle">Mükemmel aracınızı bulun ve hemen yola çıkın</p>
  </div>

  <!-- Search Card -->
  <div class="search-card">
    <div class="search-tabs">
      <button class="search-tab" (click)="setCustomerType('individual')"
        [class.search-tab--active]="customerType === 'individual'">
        Bireysel
      </button>
      <button class="search-tab" (click)="setCustomerType('corporate')"
        [class.search-tab--active]="customerType === 'corporate'">
        Kurumsal
      </button>
    </div>

    <div class="search-row">
      <div class="search-field search-field--lg">
        <label class="search-label">Teslim Alma Ofisi</label>
        <input type="text" class="search-input" [(ngModel)]="selectedStartLocation"
          placeholder="Ofis seçiniz..." [attr.list]="alisOfisiId"
          (change)="setStartLocation(selectedStartLocation)">
        <datalist [id]="alisOfisiId">
          <option *ngFor="let option of alisOfisiOptions" [value]="option.locationName"></option>
        </datalist>
      </div>

      <div class="search-field">
        <label class="search-label">Alış Tarihi</label>
        <input type="date" class="search-input" [(ngModel)]="selectedStartDate">
      </div>

      <div class="search-field search-field--sm">
        <label class="search-label">Saat</label>
        <input type="time" class="search-input" [(ngModel)]="selectedStartTime">
      </div>

      <div class="search-field">
        <label class="search-label">İade Tarihi</label>
        <input type="date" class="search-input" [(ngModel)]="selectedEndDate">
      </div>

      <div class="search-field search-field--sm">
        <label class="search-label">Saat</label>
        <input type="time" class="search-input" [(ngModel)]="selectedEndTime">
      </div>

      <button class="search-btn" (click)="onSearch()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </div>

    <div class="search-extra">
      <label class="search-checkbox">
        <input type="checkbox" (click)="toggleReturnOfficeVisibility($event)">
        <span>Araç farklı bir ofiste teslim edilecek</span>
      </label>
    </div>

    <div class="search-row" *ngIf="isDifferentReturnOffice">
      <div class="search-field search-field--lg">
        <label class="search-label">İade Etme Ofisi</label>
        <input type="text" class="search-input" [(ngModel)]="selectedEndLocation" placeholder="İade ofisi seçiniz..."
          [attr.list]="iadeOfisiId">
        <datalist [id]="iadeOfisiId">
          <option *ngFor="let option of iadeOfisiOptions" [value]="option.locationName"></option>
        </datalist>
      </div>
    </div>
  </div>
</div>
